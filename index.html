<!DOCTYPE html>
<html>
<head>
<title>Dashboard</title>

<style>
:root{
 --accent:#7c3aed;
 --bg:#0a0a0a;
 --tile:#1a1a1a;
 --text:white;
}

body{
 margin:0;
 font-family:Arial;
 background:var(--bg);
 color:var(--text);
}

.topbar{
 display:flex;
 justify-content:space-between;
 padding:10px;
 background:#111;
}

button{
 background:#222;
 border:none;
 padding:8px;
 color:white;
 border-radius:8px;
 cursor:pointer;
}
button:hover{
 background:var(--accent);
}

.page{display:none;padding:20px;}
.active{display:block;}

.grid{
 display:grid;
 grid-template-columns:repeat(auto-fill,150px);
 gap:10px;
}

.game{
 background:var(--tile);
 padding:10px;
 border-radius:10px;
 cursor:pointer;
}
.game:hover{
 background:var(--accent);
}

input,select{
 margin:5px;
 padding:8px;
 border-radius:6px;
 border:none;
 background:#222;
 color:white;
}
</style>
</head>

<body>

<div class="topbar">
<span id="user"></span>
<div>
<button onclick="nav('home')">Home</button>
<button onclick="nav('games')">Games</button>
<button onclick="nav('settings')">Customizer</button>
</div>
</div>

<div id="home" class="page active">
<h2>Home</h2>
<div id="favorites" class="grid"></div>
</div>

<div id="games" class="page">
<h2>Games</h2>

<select id="categoryFilter" onchange="renderGames()"></select>

<div id="gamesList" class="grid"></div>
</div>

<div id="settings" class="page">
<h2>Customizer</h2>

<h3>🎨 Colors</h3>
Accent<input type="color" onchange="setVar('--accent',this.value)">
BG<input type="color" onchange="setVar('--bg',this.value)">
Tile<input type="color" onchange="setVar('--tile',this.value)">

<h3>📂 Categories</h3>
<input id="newCat" placeholder="New category">
<button onclick="addCategory()">Add</button>

<div id="catList"></div>

<h3>🎮 Add Game</h3>
<input id="gName" placeholder="Name">
<input id="gURL" placeholder="URL">
<select id="gCat"></select>
<button onclick="addGame()">Add Game</button>
</div>

<script>
// ACCOUNT
let user=localStorage.getItem("user")||prompt("Username:");
localStorage.setItem("user",user);
document.getElementById("user").innerText=user;

// NAV
function nav(p){
 document.querySelectorAll(".page").forEach(x=>x.classList.remove("active"));
 document.getElementById(p).classList.add("active");
}

// STORAGE
let categories=JSON.parse(localStorage.getItem("cats"))||["All"];
let games=JSON.parse(localStorage.getItem("games"))||[
 {name:"Slope",url:"https://slopegame.io",cat:"All"}
];

// SAVE
function saveAll(){
 localStorage.setItem("cats",JSON.stringify(categories));
 localStorage.setItem("games",JSON.stringify(games));
}

// CATEGORY
function addCategory(){
 let c=document.getElementById("newCat").value;
 categories.push(c);
 saveAll();
 renderCats();
}

// RENDER CATS
function renderCats(){
 let f=document.getElementById("categoryFilter");
 let g=document.getElementById("gCat");
 let list=document.getElementById("catList");

 f.innerHTML=""; g.innerHTML=""; list.innerHTML="";

 categories.forEach(c=>{
  f.innerHTML+=`<option>${c}</option>`;
  g.innerHTML+=`<option>${c}</option>`;

  let d=document.createElement("div");
  d.innerText=c;

  d.onclick=()=>{
   if(confirm("Delete category?")){
    categories=categories.filter(x=>x!==c);
    saveAll();
    renderCats();
   }
  };

  list.appendChild(d);
 });
}

// ADD GAME
function addGame(){
 let n=document.getElementById("gName").value;
 let u=document.getElementById("gURL").value;
 let c=document.getElementById("gCat").value;

 games.push({name:n,url:u,cat:c});
 saveAll();
 renderGames();
}

// RENDER GAMES
function renderGames(){
 let list=document.getElementById("gamesList");
 list.innerHTML="";

 let filter=document.getElementById("categoryFilter").value;

 games.forEach(g=>{
  if(filter && g.cat!==filter && filter!=="All")return;

  let d=document.createElement("div");
  d.className="game";
  d.innerText=g.name;

  d.onclick=()=>window.open(g.url);

  list.appendChild(d);
 });
}

// COLORS
function setVar(v,val){
 document.documentElement.style.setProperty(v,val);
 localStorage.setItem(v,val);
}

// LOAD
window.onload=()=>{
 renderCats();
 renderGames();

 ["--accent","--bg","--tile"].forEach(v=>{
  let val=localStorage.getItem(v);
  if(val)document.documentElement.style.setProperty(v,val);
 });
};
</script>

</body>
</html>
