<!DOCTYPE html>
<html>
<head>
<title>Dashboard</title>

<style>
:root{
  --accent:#7c3aed;
  --bg:#0a0a0a;
  --tile:#1a1a1a;
  --text:white;
}

body{
  margin:0;
  font-family:Arial;
  background:var(--bg);
  color:var(--text);
  transition:0.3s;
}

/* TOPBAR */
.topbar{
  display:flex;
  justify-content:space-between;
  padding:12px;
  background:#111;
}

/* BUTTONS */
button{
  background:rgba(255,255,255,0.05);
  border:none;
  padding:8px 14px;
  color:white;
  border-radius:10px;
  cursor:pointer;
}
button:hover{
  background:var(--accent);
  box-shadow:0 0 10px var(--accent);
}

/* PAGES */
.page{display:none;padding:20px;}
.active{display:block;}

/* HOME */
.tiles{
  display:flex;
  gap:20px;
}
.tile{
  padding:50px;
  background:var(--tile);
  border-radius:16px;
  cursor:pointer;
}
.tile:hover{
  transform:scale(1.05);
  box-shadow:0 0 20px var(--accent);
}

/* GRID */
.grid{
  display:grid;
  grid-template-columns:repeat(auto-fill,150px);
  gap:10px;
}

/* GAME TILE */
.game{
  padding:12px;
  background:var(--tile);
  border-radius:10px;
  cursor:pointer;
}
.game:hover{
  background:var(--accent);
}

/* VIEWER */
#viewer{
  position:fixed;
  top:0;left:0;
  width:100%;height:100%;
  background:black;
  display:none;
}
#viewer iframe{
  width:100%;height:100%;
  border:none;
}

/* SETTINGS */
input,select{
  padding:8px;
  margin:5px;
  border-radius:8px;
  border:none;
  background:#222;
  color:white;
}
</style>
</head>

<body>

<div class="topbar">
  <span id="user"></span>
  <div>
    <button onclick="nav('home')">Home</button>
    <button onclick="nav('games')">Games</button>
    <button onclick="nav('proxy')">Proxy</button>
    <button onclick="nav('settings')">Settings</button>
  </div>
</div>

<!-- HOME -->
<div id="home" class="page active">
<h2>Home</h2>
<div class="tiles">
  <div class="tile" onclick="nav('games')">🎮 Games</div>
  <div class="tile" onclick="nav('proxy')">🌐 Proxy</div>
  <div class="tile" onclick="nav('settings')">⚙️ Settings</div>
</div>

<h3>⭐ Favorites</h3>
<div id="favorites" class="grid"></div>
</div>

<!-- GAMES -->
<div id="games" class="page">
<h2>Games</h2>

<input id="search" placeholder="Search..." oninput="renderGames()">

<h3>🔥 Recommended</h3>
<div id="recommended" class="grid"></div>

<h3>🎮 All Games</h3>
<div id="gamesList" class="grid"></div>

<button onclick="addGame()">➕ Add Game</button>
<input type="file" id="fileInput">
</div>

<!-- PROXY -->
<div id="proxy" class="page">
<h2>Proxy</h2>
<input id="proxyInput" placeholder="Enter URL">
<button onclick="openProxy()">Go</button>
</div>

<!-- SETTINGS -->
<div id="settings" class="page">
<h2>Settings</h2>

<h3>🎨 Theme Customizer</h3>
<label>Accent</label><input type="color" onchange="setVar('--accent',this.value)">
<label>Background</label><input type="color" onchange="setVar('--bg',this.value)">
<label>Tile</label><input type="color" onchange="setVar('--tile',this.value)">

<h3>🧩 UI Mode</h3>
<select onchange="setMode(this.value)">
<option value="grid">Grid</option>
<option value="list">List</option>
</select>

<h3>🕶️ Cloak</h3>
<input id="cloakName" placeholder="Tab Name">
<input id="cloakIcon" placeholder="Icon URL">
<button onclick="applyCloak()">Apply</button>

<h3>🚨 Panic</h3>
<input id="panicKey" placeholder="Key">
<input id="panicURL" placeholder="URL">
<button onclick="savePanic()">Save</button>
</div>

<!-- VIEWER -->
<div id="viewer">
<button onclick="closeViewer()">❌</button>
<iframe id="frame"></iframe>
</div>

<script>
// ACCOUNT
let user=localStorage.getItem("user");
if(!user){
 user=prompt("Username:");
 localStorage.setItem("user",user);
}
document.getElementById("user").innerText=user;

// NAV
function nav(p){
 document.querySelectorAll(".page").forEach(x=>x.classList.remove("active"));
 document.getElementById(p).classList.add("active");
}

// GAME LIST (120+)
let games=JSON.parse(localStorage.getItem("games"))||[];
if(games.length===0){
 for(let i=1;i<=120;i++){
  games.push({name:"Game "+i,url:"https://example.com"});
 }
}

// RENDER
function renderGames(){
 let list=document.getElementById("gamesList");
 let rec=document.getElementById("recommended");
 list.innerHTML="";
 rec.innerHTML="";

 let search=document.getElementById("search").value.toLowerCase();

 games.forEach((g,i)=>{
  if(!g.name.toLowerCase().includes(search))return;

  let div=document.createElement("div");
  div.className="game";
  div.innerText=g.name;

  div.onclick=()=>openViewer(g.url);

  div.oncontextmenu=(e)=>{
   e.preventDefault();
   addFav(g);
  };

  list.appendChild(div);

  if(i<10){
   let r=div.cloneNode(true);
   rec.appendChild(r);
  }
 });
}

// FAVORITES
function addFav(g){
 let favs=JSON.parse(localStorage.getItem("favs"))||[];
 favs.push(g);
 localStorage.setItem("favs",JSON.stringify(favs));
 renderFavs();
}

function renderFavs(){
 let favs=JSON.parse(localStorage.getItem("favs"))||[];
 let box=document.getElementById("favorites");
 box.innerHTML="";
 favs.forEach(g=>{
  let d=document.createElement("div");
  d.className="game";
  d.innerText=g.name;
  d.onclick=()=>openViewer(g.url);
  box.appendChild(d);
 });
}

// IMPORT
function addGame(){
 let name=prompt("Name");
 let url=prompt("URL");
 games.push({name,url});
 saveGames();
}

document.getElementById("fileInput").addEventListener("change",e=>{
 let f=e.target.files[0];
 let url=URL.createObjectURL(f);
 games.push({name:f.name,url});
 saveGames();
});

function saveGames(){
 localStorage.setItem("games",JSON.stringify(games));
 renderGames();
}

// VIEWER
function openViewer(url){
 document.getElementById("viewer").style.display="block";
 document.getElementById("frame").src=url;
}
function closeViewer(){
 document.getElementById("viewer").style.display="none";
 document.getElementById("frame").src="";
}

// PROXY
function openProxy(){
 openViewer(document.getElementById("proxyInput").value);
}

// THEME
function setVar(v,val){
 document.documentElement.style.setProperty(v,val);
 localStorage.setItem(v,val);
}

// MODE
function setMode(m){
 document.body.style.fontSize = m==="list"?"18px":"14px";
}

// CLOAK
function applyCloak(){
 document.title=document.getElementById("cloakName").value;
 let link=document.createElement("link");
 link.rel="icon";
 link.href=document.getElementById("cloakIcon").value;
 document.head.appendChild(link);
}

// PANIC
let panicKey=localStorage.getItem("panicKey")||"`";
let panicURL=localStorage.getItem("panicURL")||"https://google.com";

function savePanic(){
 panicKey=document.getElementById("panicKey").value;
 panicURL=document.getElementById("panicURL").value;
 localStorage.setItem("panicKey",panicKey);
 localStorage.setItem("panicURL",panicURL);
}

document.addEventListener("keydown",e=>{
 if(e.key===panicKey){
  window.location.href=panicURL;
 }
});

// LOAD
window.onload=()=>{
 renderGames();
 renderFavs();

 ["--accent","--bg","--tile"].forEach(v=>{
  let val=localStorage.getItem(v);
  if(val)document.documentElement.style.setProperty(v,val);
 });
};
</script>

</body>
</html>
