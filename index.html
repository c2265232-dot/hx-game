<!DOCTYPE html>
<html>
<head>
  <title>Dashboard</title>

  <style>
    :root {
      --accent: #00ffcc;
    }

    body {
      margin: 0;
      font-family: Arial;
      background: #0a0a0a;
      color: white;
      transition: 0.3s;
    }

    .topbar {
      display: flex;
      justify-content: space-between;
      padding: 12px;
      background: rgba(20,20,20,0.8);
      backdrop-filter: blur(10px);
    }

    button {
      background: rgba(255,255,255,0.05);
      border: none;
      padding: 8px 14px;
      color: white;
      border-radius: 8px;
      cursor: pointer;
      transition: 0.2s;
    }

    button:hover {
      background: var(--accent);
      box-shadow: 0 0 10px var(--accent);
    }

    .page {
      display: none;
      padding: 25px;
    }

    .active {
      display: block;
    }

    .tiles {
      display: flex;
      gap: 20px;
      margin-top: 20px;
    }

    .tile {
      padding: 50px;
      background: rgba(255,255,255,0.05);
      border-radius: 16px;
      cursor: pointer;
      transition: 0.25s;
      backdrop-filter: blur(10px);
    }

    .tile:hover {
      transform: scale(1.08);
      box-shadow: 0 0 20px var(--accent);
    }

    #gamesList div {
      padding: 14px;
      margin: 6px;
      border-radius: 10px;
      background: rgba(255,255,255,0.05);
      cursor: pointer;
      transition: 0.2s;
    }

    #gamesList div:hover {
      background: var(--accent);
      box-shadow: 0 0 10px var(--accent);
    }

    #viewer {
      position: fixed;
      top:0;
      left:0;
      width:100%;
      height:100%;
      background:black;
      display:none;
    }

    #viewer iframe {
      width:100%;
      height:100%;
      border:none;
    }

    #viewer button {
      position:absolute;
      top:10px;
      right:10px;
      z-index:10;
    }

    input, select {
      padding: 8px;
      margin: 5px;
      border-radius: 8px;
      border: none;
      background: rgba(255,255,255,0.05);
      color: white;
    }
  </style>
</head>

<body>

<div class="topbar">
  <span id="user"></span>

  <div>
    <button onclick="nav('home')">Home</button>
    <button onclick="nav('games')">Games</button>
    <button onclick="nav('proxy')">Proxy</button>
    <button onclick="nav('settings')">Settings</button>
  </div>
</div>

<!-- HOME -->
<div id="home" class="page active">
  <h2>Home</h2>
  <div class="tiles">
    <div class="tile" onclick="nav('games')">🎮 Games</div>
    <div class="tile" onclick="nav('proxy')">🌐 Proxy</div>
    <div class="tile" onclick="nav('settings')">⚙️ Settings</div>
  </div>
</div>

<!-- GAMES -->
<div id="games" class="page">
  <h2>Games</h2>

  <input id="search" placeholder="Search..." oninput="renderGames()">

  <div id="gamesList"></div>

  <button onclick="addGame()">➕ Add Game</button>
  <input type="file" id="fileInput">
</div>

<!-- PROXY -->
<div id="proxy" class="page">
  <h2>Proxy</h2>
  <input id="proxyInput" placeholder="Enter URL">
  <button onclick="openProxy()">Go</button>
</div>

<!-- SETTINGS -->
<div id="settings" class="page">
  <h2>Settings</h2>

  <h3>Theme Mode</h3>
  <select onchange="setTheme(this.value)">
    <option value="dark">Dark</option>
    <option value="neon">Neon</option>
    <option value="glass">Glass</option>
    <option value="light">Light</option>
  </select>

  <h3>Accent Color</h3>
  <input type="color" onchange="setAccent(this.value)">

  <h3>Cloak</h3>
  <input id="cloakName" placeholder="Tab Name">
  <input id="cloakIcon" placeholder="Icon URL">
  <button onclick="applyCloak()">Apply</button>

  <h3>Panic Button</h3>
  <input id="panicKey" placeholder="Key">
  <input id="panicURL" placeholder="Redirect URL">
  <button onclick="savePanic()">Save</button>
</div>

<!-- VIEWER -->
<div id="viewer">
  <button onclick="closeViewer()">❌</button>
  <iframe id="frame"></iframe>
</div>

<script>
// ===== ACCOUNT =====
let user = localStorage.getItem("user");
if (!user) {
  user = prompt("Enter username:");
  localStorage.setItem("user", user);
}
document.getElementById("user").innerText = user;

// ===== NAV =====
function nav(page) {
  document.querySelectorAll(".page").forEach(p => p.classList.remove("active"));
  document.getElementById(page).classList.add("active");
}

// ===== GAMES =====
let games = JSON.parse(localStorage.getItem("games")) || [
  { name: "Slope", url: "https://slopegame.io" },
  { name: "Run 3", url: "https://run3.io" },
  { name: "Retro Bowl", url: "https://retrobowl.me" },
  { name: "Drift Boss", url: "https://driftboss.io" },
  { name: "1v1.LOL", url: "https://1v1.lol" }
];

function renderGames() {
  let list = document.getElementById("gamesList");
  list.innerHTML = "";

  let search = document.getElementById("search").value.toLowerCase();

  games.forEach(g => {
    if (!g.name.toLowerCase().includes(search)) return;

    let div = document.createElement("div");
    div.innerText = g.name;
    div.onclick = () => openViewer(g.url);
    list.appendChild(div);
  });
}

function addGame() {
  let name = prompt("Game name:");
  let url = prompt("Game URL:");

  games.push({ name, url });
  localStorage.setItem("games", JSON.stringify(games));
  renderGames();
}

document.getElementById("fileInput").addEventListener("change", function(e){
  let file = e.target.files[0];
  if (!file) return;

  let url = URL.createObjectURL(file);
  games.push({ name: file.name, url });

  localStorage.setItem("games", JSON.stringify(games));
  renderGames();
});

// ===== VIEWER =====
function openViewer(url) {
  document.getElementById("viewer").style.display = "block";
  document.getElementById("frame").src = url;
}

function closeViewer() {
  document.getElementById("viewer").style.display = "none";
  document.getElementById("frame").src = "";
}

// ===== PROXY =====
function openProxy() {
  let url = document.getElementById("proxyInput").value;
  openViewer(url);
}

// ===== CLOAK =====
function applyCloak() {
  let name = document.getElementById("cloakName").value;
  let icon = document.getElementById("cloakIcon").value;

  document.title = name;

  let link = document.querySelector("link[rel~='icon']");
  if (!link) {
    link = document.createElement("link");
    link.rel = "icon";
    document.head.appendChild(link);
  }

  link.href = icon;
}

// ===== PANIC =====
let panicKey = localStorage.getItem("panicKey") || "`";
let panicURL = localStorage.getItem("panicURL") || "https://google.com";

function savePanic() {
  panicKey = document.getElementById("panicKey").value;
  panicURL = document.getElementById("panicURL").value;

  localStorage.setItem("panicKey", panicKey);
  localStorage.setItem("panicURL", panicURL);
}

document.addEventListener("keydown", e => {
  if (e.key === panicKey) {
    window.location.href = panicURL;
  }
});

// ===== THEMES =====
let accent = localStorage.getItem("accent") || "#00ffcc";

function applyAccent() {
  document.documentElement.style.setProperty("--accent", accent);
}

function setAccent(color) {
  accent = color;
  localStorage.setItem("accent", color);
  applyAccent();
}

function setTheme(theme) {
  localStorage.setItem("theme", theme);

  if (theme === "dark") {
    document.body.style.background = "#0a0a0a";
    document.body.style.color = "white";
  }

  if (theme === "light") {
    document.body.style.background = "#f5f5f5";
    document.body.style.color = "black";
  }

  if (theme === "neon") {
    document.body.style.background = "#050505";
  }

  if (theme === "glass") {
    document.body.style.background = "url('https://picsum.photos/1920/1080') center/cover";
  }
}

// ===== LOAD =====
window.onload = () => {
  renderGames();
  applyAccent();

  let theme = localStorage.getItem("theme");
  if (theme) setTheme(theme);
};
</script>

</body>
</html>
